
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Your English AI Coach - CRIBRO ENGLISH</title>
    <meta name="description" content="Your English AI Coach - Spersonalizowane lekcje angielskiego z AI" />
    <meta property="og:title" content="Your English AI Coach" />
    <meta property="og:description" content="Twoja osobista platforma do nauki języka angielskiego z wykorzystaniem sztucznej inteligencji." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#72f0b4', // Accent green
              secondary: '#7a8da6', // Accent gray/muted
              'base-100': '#0a0e1a', // Main dark background
              'base-200': '#141b2a', // Panel background
              'base-300': 'rgba(255, 255, 255, 0.08)', // Subtle borders
              'content': '#eae8e3', // Main text
              'content-muted': '#7a8da6', // Muted text
              'dark-base-100': '#0a0e1a',
              'dark-base-200': '#141b2a',
              'dark-base-300': 'rgba(255, 255, 255, 0.08)',
              'dark-content': '#eae8e3',
            },
            fontFamily: {
              sans: ['"DM Sans"', 'sans-serif'],
              display: ['"Cormorant Garamond"', 'serif'],
              mono: ['"DM Mono"', 'monospace'],
            },
            animation: {
              shake: 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'fade-in-up': 'fadeInUp 0.65s ease-out forwards',
              pulsar: 'pulsar 3s infinite',
              'pulse-delicate': 'pulseDelicate 2.5s infinite ease-in-out',
            },
            keyframes: {
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              },
              fadeInUp: {
                from: { opacity: 0, transform: 'translateY(24px)' },
                to: { opacity: 1, transform: 'translateY(0)' },
              },
              pulsar: {
                '0%, 100%': { 
                  'box-shadow': '0 0 0 0 rgba(114, 240, 180, 0.2)',
                  'border-color': 'rgba(114, 240, 180, 0.3)'
                },
                '50%': { 
                  'box-shadow': '0 0 16px 4px rgba(114, 240, 180, 0.5)',
                  'border-color': 'rgba(114, 240, 180, 0.7)'
                }
              },
              pulseDelicate: {
                '0%, 100%': {
                  transform: 'scale(1)',
                  'text-shadow': '0 0 0px rgba(114, 240, 180, 0)'
                },
                '50%': {
                  transform: 'scale(1.02)',
                  'text-shadow': '0 0 8px rgba(114, 240, 180, 0.6)'
                }
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Mono:wght@500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .scrollbar-hide {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      :root { font-family: 'DM Sans', sans-serif; }
      body {
        background-color: #0a0e1a;
        color: #eae8e3;
        line-height: 1.6;
        letter-spacing: 0.02em;
      }
      h1, h2, h3 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 700;
        line-height: 1.2;
      }
      .tag-green {
        background: rgba(114, 240, 180, 0.12); /* base-primary 12% */
        border: 1px solid rgba(114, 240, 180, 0.3);
        color: #72f0b4;
        padding: 3px 9px;
        border-radius: 2px;
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
    </style>
