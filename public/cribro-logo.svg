<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="600" height="200" fill="#121212" rx="20"/>
  
  <g transform="translate(90, 50)">
    <!-- Logo SVG -->
    <g filter="url(#glow)">
      <!-- Outer arc -->
      <path d="M 82.7 27 A 40 40 0 1 0 82.7 73" fill="none" stroke="#4ADE80" stroke-width="8" stroke-linecap="round" />
      <!-- Inner arc -->
      <path d="M 67.6 67.6 A 25 25 0 1 1 67.6 32.4" fill="none" stroke="#4ADE80" stroke-width="6" stroke-linecap="round" />
      <!-- Dot -->
      <circle cx="67.6" cy="67.6" r="6.5" fill="#4ADE80" />
    </g>

    <!-- Text -->
    <g transform="translate(130, 42)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="44" font-weight="500" fill="#ffffff" letter-spacing="0.05em">CRIBRO</text>
      <text x="0" y="44" font-family="'Inter', system-ui, sans-serif" font-size="48" font-weight="900" fill="#4ADE80" letter-spacing="-0.02em">ENGLISH</text>
      <text x="0" y="74" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="400" fill="#a0a0a0" letter-spacing="0.2em">LESS NOISE. MORE LANGUAGE.</text>
    </g>
  </g>
</svg>
